<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>局域网聊天室</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft Yahei", sans-serif;
}
body {
    background-color: #f5f7fa;
    padding: 30px;
    max-width: 800px;
    margin: 0 auto;
}
.container {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 15px rgba(0,0,0,0.1);
    padding: 25px;
}
.title {
    text-align: center;
    color: #2d3748;
    margin-bottom: 12px;
    font-size: 24px;
}
.sub-title-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 25px;
}
.line {
    width: 60px;
    height: 1px;
    background-color: #ccc;
}
.sub-title {
    margin: 0 15px;
    font-size: 14px;
    color: #666;
}
.form-item {
    margin-bottom: 18px;
}
label {
    display: inline-block;
    width: 70px;
    color: #4a5568;
    font-size: 15px;
}
input {
    padding: 9px 12px;
    border: 1px solid #cbd5e0;
    border-radius: 6px;
    width: 260px;
    font-size: 14px;
    transition: border 0.2s;
}
input:focus {
    outline: none;
    border-color: #4299e1;
}
.btn-group {
    margin: 20px 0;
}
button {
    padding: 9px 22px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    margin-right: 12px;
    transition: opacity 0.2s;
}
button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
.link-btn {
    background-color: #4299e1;
    color: white;
}
.exit-btn {
    background-color: #e53e3e;
    color: white;
}
.chat-box {
    height: 320px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 15px;
    overflow-y: auto;
    background-color: #f8fafc;
    margin-bottom: 10px;
    line-height: 1.6;
}
.status-text {
    font-size: 13px;
    color: #666;
    text-align: center;
    margin-bottom: 15px;
}
.send-area {
    display: flex;
    gap: 10px;
    align-items: center;
}
#msg {
    flex: 1;
}
.send-btn {
    background-color: #38b2ac;
    color: white;
}
.system-msg {
    color: #92400e;
    background-color: #fef3c7;
    padding: 4px 8px;
    border-radius: 4px;
    display: inline-block;
}
</style>
</head>
<body>
<div class="container">
    <h2 class="title">局域网聊天室</h2>
    <div class="sub-title-wrap">
        <span class="line"></span>
        <span class="sub-title">服务器IP填192.168.3.13</span>
        <span class="line"></span>
    </div>

    <div class="form-item">
        <label>昵称：</label>
        <input type="text" id="name" placeholder="请输入聊天昵称">
    </div>

    <div class="form-item">
        <label>服务器IP：</label>
        <input type="text" id="ip" value="192.168.3.13">
    </div>

    <div class="btn-group">
        <button class="link-btn" onclick="link()" id="linkBtn">连接</button>
        <button class="exit-btn" onclick="exit()" id="exitBtn" disabled>退出</button>
    </div>

    <div id="box" class="chat-box"></div>
    <div class="status-text" id="statusText">状态：未连接</div>

    <div class="send-area">
        <input type="text" id="msg" placeholder="输入消息内容">
        <button class="send-btn" onclick="send()">发送</button>
    </div>
</div>

<script>
var ws;
var isConnected = false;

function link(){
  if(isConnected) return;
  let name = document.getElementById("name").value.trim();
  let ip = document.getElementById("ip").value.trim();
  
  if(!name){
    addSystemMsg("请输入昵称！");
    return;
  }

  isConnected = true;
  document.getElementById("name").disabled = true;
  document.getElementById("linkBtn").disabled = true;
  document.getElementById("exitBtn").disabled = false;
  document.getElementById("statusText").innerText = "状态：连接中...";

  ws = new WebSocket("ws://"+ip+":8080");

  ws.onopen = function(){
    // 去掉alert，改用聊天框提示
    addSystemMsg("✅ 连接成功！");
    document.getElementById("statusText").innerText = "状态：已连接";
    // 连接成功后，立刻发送一条上线通知
    ws.send(name + "：已加入聊天室");
  };

  ws.onmessage = function(res){
    document.getElementById("box").innerHTML += res.data + "<br>";
    document.getElementById("box").scrollTop = document.getElementById("box").scrollHeight;
  };

  ws.onclose = function(){
    resetStatus();
    addSystemMsg("❌ 连接已断开");
    document.getElementById("statusText").innerText = "状态：已断开";
  };

  ws.onerror = function(){
    resetStatus();
    addSystemMsg("⚠️ 连接失败，请检查IP和服务器，或者主机好像没有开启服务器");
    document.getElementById("statusText").innerText = "状态：连接失败";
  };
}

function exit(){
  if(ws){
    ws.close();
  }
  resetStatus();
}

function resetStatus(){
  isConnected = false;
  document.getElementById("name").disabled = false;
  document.getElementById("linkBtn").disabled = false;
  document.getElementById("exitBtn").disabled = true;
}

function send(){
  if(!isConnected) return;
  let name = document.getElementById("name").value;
  let msg = document.getElementById("msg").value.trim();
  if(!msg) return;

  ws.send(name + "：" + msg);
  document.getElementById("msg").value = "";
}

// 在聊天框里显示系统提示
function addSystemMsg(text) {
  const box = document.getElementById("box");
  box.innerHTML += `<span class="system-msg">系统：${text}</span><br>`;
  box.scrollTop = box.scrollHeight;
}
</script>
</body>
</html>
