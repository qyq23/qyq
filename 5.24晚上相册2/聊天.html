<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易在线聊天室</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
        body{background:#f5f5f5;max-width:500px;margin:0 auto;padding:10px}
        .chat{background:#fff;border-radius:12px;height:70vh;padding:15px;overflow-y:auto;margin-bottom:10px}
        .msg{margin:8px 0;max-width:75%}
        .me{margin-left:auto;background:#4285f4;color:#fff;border-radius:12px 12px 2px 12px;padding:8px 12px}
        .other{background:#eaeaea;color:#333;border-radius:12px 12px 12px 2px;padding:8px 12px}
        .name{font-size:12px;color:#666;margin-bottom:3px}
        .time{font-size:10px;text-align:right;margin-top:3px;opacity:0.7}
        .input{display:flex;gap:5px}
        input{flex:1;padding:10px 14px;border-radius:20px;border:1px solid #ddd;outline:none}
        button{padding:10px 16px;background:#4285f4;color:#fff;border:none;border-radius:20px}
        .nick{margin-bottom:8px}
        #nick{width:100%;padding:8px 12px;border-radius:20px;border:1px solid #ddd}
    </style>
</head>
<body>

<div class="nick">
    <input type="text" id="nick" placeholder="输入昵称">
</div>
<div class="chat" id="chat"></div>
<div class="input">
    <input type="text" id="text" placeholder="输入消息...">
    <button onclick="send()">发送</button>
</div>

<script>
// 100% 纯本地运行，不连任何外部服务器！
function $(id){return document.getElementById(id)}

function send(){
    let nick = $("nick").value || "匿名"
    let text = $("text").value
    if(!text)return

    let time = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
    let msg = {nick,text,time}

    // 保存到本地存储
    let list = JSON.parse(localStorage.chat||"[]")
    list.push(msg)
    localStorage.chat = JSON.stringify(list)

    $("text").value = ""
    show()
}

function show(){
    let chat = $("chat")
    let my = $("nick").value || "匿名"
    let list = JSON.parse(localStorage.chat||"[]")

    chat.innerHTML = ""
    list.forEach(m=>{
        let div = document.createElement("div")
        div.className = m.nick==my ? "msg me" : "msg other"
        div.innerHTML = `<div class="name">${m.nick}</div>${m.text}<div class="time">${m.time}</div>`
        chat.appendChild(div)
    })
    chat.scrollTop = chat.scrollHeight
}

// 回车发送
$("text").addEventListener("keypress",e=>{
    if(e.key=="Enter")send()
})

// 实时刷新
setInterval(show,500)
</script>
</body>
</html>
