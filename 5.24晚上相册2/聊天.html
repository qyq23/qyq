<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>局域网聊天</title>
</head>
<body>
    <h1>局域网聊天</h1>
    昵称：<input type="text" id="name"><br><br>
    服务器IP：<input type="text" id="ip" value="127.0.0.1"><br><br>
    <button onclick="connect()">连接</button>
    <hr>
    <div id="msgBox" style="height:300px; border:1px solid #ccc; overflow-y:auto;"></div>
    <br>
    输入：<input type="text" id="inputMsg" style="width:70%">
    <button onclick="send()">发送</button>

    <script>
        let ws;
        function connect() {
            const name = document.getElementById("name").value;
            const ip = document.getElementById("ip").value;
            ws = new WebSocket(`ws://${ip}:8080`);

            ws.onopen = () => alert("连接成功！");
            ws.onmessage = (event) => {
                // 直接把消息当文本追加到页面
                document.getElementById("msgBox").innerHTML += event.data + "<br>";
            };
        }

        function send() {
            const name = document.getElementById("name").value;
            const text = document.getElementById("inputMsg").value;
            ws.send(`${name}：${text}`);
            document.getElementById("inputMsg").value = "";
        }
    </script>
</body>
</html>
