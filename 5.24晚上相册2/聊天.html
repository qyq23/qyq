<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>局域网聊天室</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",sans-serif;}
body{background:#f5f7fa;padding:30px;max-width:800px;margin:0 auto;}
.container{background:#fff;border-radius:12px;box-shadow:0 2px 15px rgba(0,0,0,0.1);padding:25px;}
.title{text-align:center;color:#2d3748;margin-bottom:12px;font-size:24px;}
.sub-title-wrap{display:flex;align-items:center;justify-content:center;margin-bottom:20px;}
.line{width:60px;height:1px;background:#ccc;}
.sub-title{margin:0 15px;font-size:14px;color:#666;}
.top-info{display:flex;justify-content:space-between;font-size:13px;color:#666;margin-bottom:15px;}
.form-item{margin-bottom:18px;}
label{display:inline-block;width:70px;color:#4a5568;font-size:15px;}
input{padding:9px 12px;border:1px solid #cbd5e0;border-radius:6px;width:260px;font-size:14px;transition:0.2s;}
input:focus{outline:none;border-color:#4299e1;}
.btn-group{margin:20px 0;}
button{padding:9px 22px;border:none;border-radius:6px;cursor:pointer;font-size:14px;margin-right:10px;opacity:0.9;}
button:disabled{opacity:0.5;cursor:not-allowed;}
.link-btn{background:#4299e1;color:#fff;}
.exit-btn{background:#e53e3e;color:#fff;}
.clear-btn{background:#999;color:#fff;}
.chat-box{height:320px;border:1px solid #e2e8f0;border-radius:8px;padding:15px;overflow-y:auto;background:#f8fafc;margin-bottom:10px;}
.send-area{display:flex;gap:10px;align-items:center;}
#msg{flex:1;}
.send-btn{background:#38b2ac;color:#fff;}
.system-msg{color:#0d6efd;background:#e7f1ff;padding:4px 10px;border-radius:6px;display:inline-block;margin:4px 0;}
.tip-msg{color:#dc3545;background:#ffe9ec;padding:4px 10px;border-radius:6px;margin:4px 0;display:inline-block;}
.msg-self{text-align:right;margin:6px 0;}
.msg-other{text-align:left;margin:6px 0;}
.bubble-self{display:inline-block;background:#4299e1;color:#fff;padding:6px 10px;border-radius:10px 10px 2px 10px;max-width:70%;}
.bubble-other{display:inline-block;background:#e9ecef;color:#333;padding:6px 10px;border-radius:10px 10px 10px 2px;max-width:70%;}
.msg-time{font-size:11px;color:#999;margin-top:3px;}
</style>
</head>
<body>
<div class="container">
    <h2 class="title">局域网聊天室</h2>
    <div class="sub-title-wrap">
        <span class="line"></span>
        <span class="sub-title">服务器IP填192.168.3.13</span>
        <span class="line"></span>
    </div>
    <div class="top-info">
        <span id="onlineNum">在线人数：0</span>
        <span id="statusText">状态：未连接</span>
    </div>
    <div class="form-item">
        <label>昵称：</label>
        <input type="text" id="name" placeholder="请输入聊天昵称">
    </div>
    <div class="form-item">
        <label>服务器IP：</label>
        <input type="text" id="ip" value="192.168.3.13">
    </div>
    <div class="btn-group">
        <button class="link-btn" onclick="link()" id="linkBtn">连接</button>
        <button class="exit-btn" onclick="exit()" id="exitBtn" disabled>退出</button>
        <button class="clear-btn" onclick="clearChat()">清空记录</button>
    </div>
    <div id="box" class="chat-box"></div>
    <div class="send-area">
        <input type="text" id="msg" placeholder="输入消息内容，最多120字" maxlength="120" onkeydown="enterSend(event)">
        <button class="send-btn" onclick="send()">发送</button>
    </div>
</div>
<script>
let ws,isConnected=false,myName="";
function enterSend(e){if(e.keyCode===13)send();}
function scrollBottom(){let b=document.getElementById("box");b.scrollTop=b.scrollHeight;}

function link(){
    if(isConnected)return;
    let name=document.getElementById("name").value.trim();
    let ip=document.getElementById("ip").value.trim();
    if(!name){addSysMsg("请输入昵称");return;}
    myName=name;isConnected=true;
    document.getElementById("name").disabled=true;
    document.getElementById("linkBtn").disabled=true;
    document.getElementById("exitBtn").disabled=false;
    document.getElementById("statusText").innerText="状态：连接中...";
    ws=new WebSocket("ws://"+ip+":8080");
    ws.onopen=()=>{
        addSysMsg("连接成功");
        document.getElementById("statusText").innerText="状态：已连接";
        ws.send(myName+"：已加入聊天室");
    };
    ws.onmessage=res=>{
        try{
            let d=JSON.parse(res.data);
            if(d.type==="online"){
                document.getElementById("onlineNum").innerText="在线人数："+d.count;
                return;
            }
            if(d.type==="sys"){addSysMsg(d.text);return;}
            if(d.type==="tip"){addTipMsg(d.text);return;}
            if(d.type==="chat"){renderChat(d);return;}
        }catch(e){}
    };
    ws.onclose=()=>{
        resetStatus();addSysMsg("连接断开");
        document.getElementById("statusText").innerText="状态：已断开";
        document.getElementById("onlineNum").innerText="在线人数：0";
        setTimeout(link,5000);
    };
    ws.onerror=()=>{
        resetStatus();addTipMsg("连接失败");
        document.getElementById("statusText").innerText="状态：连接失败";
    };
}

function renderChat(d){
    let box=document.getElementById("box");
    if(d.name===myName){
        box.innerHTML+=`<div class="msg-self"><div class="bubble-self">${d.content}</div><div class="msg-time">${d.name} ${d.time}</div></div>`;
    }else{
        box.innerHTML+=`<div class="msg-other"><div class="bubble-other">${d.content}</div><div class="msg-time">${d.name} ${d.time}</div></div>`;
    }
    scrollBottom();
}
function exit(){if(ws)ws.close();clearChat();resetStatus();}
function resetStatus(){
    isConnected=false;myName="";
    document.getElementById("name").disabled=false;
    document.getElementById("linkBtn").disabled=false;
    document.getElementById("exitBtn").disabled=true;
}
function send(){
    if(!isConnected)return;
    let val=document.getElementById("msg").value.trim();
    if(!val)return;
    ws.send(myName+"："+val);
    document.getElementById("msg").value="";
}
function clearChat(){document.getElementById("box").innerHTML="";}
function addSysMsg(t){
    let b=document.getElementById("box");
    b.innerHTML+=`<div class="system-msg">系统：${t}</div>`;scrollBottom();
}
function addTipMsg(t){
    let b=document.getElementById("box");
    b.innerHTML+=`<div class="tip-msg">提示：${t}</div>`;scrollBottom();
}
</script>
</body>
</html>
